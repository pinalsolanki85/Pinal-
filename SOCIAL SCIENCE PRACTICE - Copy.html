<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Quiz PRO - આંતરોલ  પ્રાથમિક શાળા</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* Base Styling */
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; background:#1a1a2e; }
        .hidden { display:none !important; }

       /* Colorful Working Area (Card with River Theme) */
        .card { 
            max-width: 650px; width: 90%; margin: 20px; padding: 30px; 
            border-radius: 30px; 
            border: 4px solid #ffffff;
            position: relative; /* આ જરૂરી છે ફૂટર માટે */
            padding-bottom: 70px; /* ફૂટર માટે નીચે જગ્યા */
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            background: linear-gradient(120deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb); 
            background-size: 400% 400%; 
            animation: riverFlow 15s ease infinite; 
        }
       
        @keyframes riverFlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
            
		/* Footer inside card */
        .p_info {
            position: absolute;
            bottom: 15px;
            left: 25px;
            font-size: 13px;
            pointer-events: none;
		opacity:0.85;
            user-select: none;
        }

        /* Colorful Working Area (Card) */
        

        /* હેડર લેઆઉટમાં ફેરફાર */
    header { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    position: relative; 
    margin-bottom: 20px; 
    padding-left: 90px; /* લોગો નાનો કર્યો એટલે પેડિંગ ઘટાડ્યું */
    padding-right: 10px; 
    min-height: 90px; 
    text-align: center;
}

    header img { 
    position: absolute; 
    left: 0; 
    top: 50%; /* વર્ટિકલ વચ્ચે લાવવા માટે */
    transform: translateY(-50%);
    height: 70px;  /* લોગોની સાઈઝ ઘટાડી */
    width: 70px;   /* લોગોની સાઈઝ ઘટાડી */
    object-fit: cover; 
    background: #fff; 
    padding: 3px; 
    border-radius: 50%; 
    border: 3px solid #673ab7;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}
        header div { text-align: center; }
        h1 { color: #4a148c; margin: 0; font-size: 24px; }
        p { color: #d81b60; font-weight: bold; margin: 5px 0 0 0; }

        /* Buttons and Inputs */
        input, select, button { width:100%; padding:14px; margin:8px 0; border-radius:12px; border:none; font-size:16px; background:#f5f5f5; }
        button { 
            background: linear-gradient(to right, #673ab7, #9c27b0); color:#fff; font-weight:bold; cursor:pointer; 
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Quiz Palette */
        .palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; padding: 10px; }
        .palette button { width: 40px; height: 40px; border-radius: 50%; border: none; background: #fff; color: #673ab7; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .palette button.active { background: #673ab7; color: white; transform: scale(1.1); }

        /* Quiz Options */
        .option { padding: 15px; border-radius: 12px; margin: 10px 0; background: #ffffff; color: #333; cursor: pointer; border: 2px solid #e0e0e0; font-weight: 600; transition: 0.3s; }
        .option:hover { background: #673ab7; color: white; border-color: #673ab7; }
        .right { background: #2ecc71 !important; color: white !important; }
        .wrong { background: #e74c3c !important; color: white !important; }
        .top { display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px; }
        #result-area { text-align: center; }
         #certificate-display {
    background: white;
    border: 10px double #0561af;
    padding: 25px;
    border-radius: 20px;
    color: #333;
    margin-bottom: 20px;
}
	/* Result Stats Styling */
.stat-box {
    display: flex;
    justify-content: space-around;
    gap: 15px;
    margin: 20px 0;
}
.stat-item {
    flex: 1;
    padding: 15px;
    border-radius: 20px;
    background: white;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    text-align: center;
}
.stat-value {
    font-size: 35px; /* આંકડા મોટા કર્યા */
    font-weight: 900;
    display: block;
    line-height: 1;
}
.stat-label {
    font-size: 14px;
    font-weight: bold;
    color: #555;
    margin-top: 5px;
    display: block;
}

/* Result Table Highlight */
#teacher table {
    border-radius: 15px;
    overflow: hidden;
    border: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
#teacher thead {
    background: linear-gradient(135deg, #4a148c, #673ab7);
    color: white;
}
#teacher th { padding: 15px; text-transform: uppercase; font-size: 14px; }
#teacher td { padding: 12px; border-bottom: 1px solid #eee; }
#teacher tr:hover { background-color: #f1f1f1; }
 
.res-score { color: #2ecc71; font-weight: 900; font-size: 18px; }
.res-percent { color: #e67e22; font-weight: 900; font-size: 18px; }
#table tr:nth-child(even) { background-color: #f9f9f9; }
#table td { text-align: center; border: 1px solid #eee; }

/* સ્કોરને અપૂર્ણાંક (Fraction) જેવો ઉભો બતાવવા માટે */
.fraction {
    display: inline-flex;
    flex-direction: column;
    vertical-align: middle;
    align-items: center;
    font-weight: bold;
}
.numerator {
    border-bottom: 2px solid #4a148c; /* આ આડી લાઈન બનાવશે */
    padding: 0 5px;
    color: #27ae60; /* મેળવેલ ગુણનો રંગ */
    font-size: 18px;
}
.denominator {
    padding: 0 5px;
    color: #444; /* કુલ ગુણનો રંગ */
    font-size: 16px;
}
  

   #capture-area {
    max-width: 100%;
    box-sizing: border-box;
}
@media screen and (max-width: 600px) {
    #capture-area {
        padding: 15px !important; /* મોબાઈલ માટે પેડિંગ ઓછું કર્યું */
    }
}

    </style>
</head>

<body>

    <div class="card" id="home">
        <header>
          <div>
                <h1>રાજકોટ પ્રાથમિક શાળા</h1>
<p>જ્ઞાન સાધના -સામાજીક વિજ્ઞાન પ્રેક્ટિસ ની મોજીલી ક્વિઝ</p>
<p>શ્રી બળવંતભાઈ ઠાકોર</p>


</div>
</header>

<input id="roll" placeholder="રોલ નંબર">
<input id="studentName" placeholder="વિદ્યાર્થીનું નામ">

<select id="subject" onchange="loadChapters();setTheme();">
<option value="">વિષય પસંદ કરો</option>
<option value="maths">જ્ઞાન સાધના સામા.વિજ્ઞાનની તૈયારી </option>


</select>

<select id="chapter">
<option value="">પાઠ પસંદ કરો</option>
</select>

<button onclick="startQuiz()">ક્વિઝ શરૂ કરો</button>
<button onclick="openTeacher()" style="background:#444;">👨‍🏫 શિક્ષક લોગિન</button>
    </div>

<!-- QUIZ -->
<div class="card hidden" id="quiz">
        <div class="top"><div id="progress"></div><div id="timer"></div></div>
        <h3 id="q"></h3>
        <div id="opts"></div>
        <div id="palette" class="palette"></div>
    </div>

    <div class="card hidden" id="result">
        <h2 id="score"></h2>
        <div id="grade" style="font-size: 20px; font-weight: bold; margin-bottom:10px;"></div>
        <div id="details"></div>
        
        <button onclick="goHome()">🏠 મુખ્ય મેનુ</button>
    </div>

    <div class="card hidden" id="teacherLoginBox">
        <h3>શિક્ષક લોગિન</h3>
        <input type="password" id="tpass" placeholder="પાસવર્ડ">
        <button onclick="teacherLogin()">LOGIN</button>
        <button onclick="goHome()" style="background:#444;">🏠 HOME</button>
    </div>

    <div class="card hidden" id="teacher">
        <h3>📊 પરિણામ પત્રક</h3>
        <table border="1" width="100%" style="background:#fff; color:#333; border-collapse:collapse; padding:10px;">
            <thead>
                <tr><th>રોલ</th><th>નામ</th><th>વિષય</th><th>પાઠ</th><th>સ્કોર</th><th>ટકા</th><th>તારીખ</th></tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
        <br>
        <button onclick="downloadExcel()">📥 Excel Download</button>
        <button onclick="clearAllResults()" style="background:#e74c3c;">🗑️ બધું ડિલીટ કરો</button>
        <button onclick="goHome()" style="background:#444;">🏠 મુખ્ય મેનુ</button>
    </div>
<div id="result-area" class="hidden">
    <div id="certificate-display">
        </div>
    <button class="btn" onclick="location.reload()">ફરીથી ટેસ્ટ આપો</button>
</div>
<script>
     // Footer Content
       
        // Quiz Data and Logic
 const DATA = {
     maths: {
   "સામાજિક વિજ્ઞાન ( જ્ઞાન સાધના ની તૈયારી)": [
    {q:"ભારતમાં આવવાનો જળમાર્ગ કોણે શોધ્યો હતો?", o:["કોલંબસ", "વાસ્કો-દ-ગામા", "પ્રિન્સ હેનરી", "મેગેલન"], a:"વાસ્કો-દ-ગામા"},
    {q:"બક્સરનું યુદ્ધ કઈ સાલમાં થયું હતું?", o:["1757", "1764", "1857", "1526"], a:"1764"},
    {q:"ભારતમાં અંગ્રેજી શિક્ષણની શરૂઆત કોણે કરાવી હતી?", o:["લોર્ડ વિલિયમ બેન્ટિક", "લોર્ડ ડેલહાઉસી", "લોર્ડ મેકોલે", "લોર્ડ કર્ઝન"], a:"લોર્ડ મેકોલે"},
    {q:"જલિયાવાલા બાગનો હત્યાકાંડ કયા શહેરમાં થયો હતો?", o:["દિલ્હી", "લાહોર", "અમૃતસર", "ચંડીગઢ"], a:"અમૃતસર"},
    {q:"ભારતની રાષ્ટ્રીય અભિલેખાગાર ક્યાં આવેલી છે?", o:["મુંબઈ", "કોલકાતા", "ચેન્નાઈ", "દિલ્હી"], a:"દિલ્હી"},
    {q:"ભારતમાં રેલવેની શરૂઆત કયા વર્ષમાં થઈ હતી?", o:["1853", "1857", "1901", "1833"], a:"1853"},
    {q:"નીચેનામાંથી કયું સંસાધન અક્ષય (પુનઃપ્રાપ્ય) છે?", o:["કોલસો", "પેટ્રોલિયમ", "સૌર ઉર્જા", "કુદરતી વાયુ"], a:"સૌર ઉર્જા"},
    {q:"વિશ્વમાં સૌથી વધુ વસ્તી ધરાવતો દેશ કયો છે?", o:["ભારત", "ચીન", "અમેરિકા", "રશિયા"], a:"ભારત"},
    {q:"ભારતનું બંધારણ ક્યારે અમલમાં આવ્યું?", o:["15 ઓગસ્ટ 1947", "26 જાન્યુઆરી 1950", "26 નવેમ્બર 1949", "30 જાન્યુઆરી 1948"], a:"26 જાન્યુઆરી 1950"},
    {q:"રાજ્યસભાના અધ્યક્ષ કોણ હોય છે?", o:["રાષ્ટ્રપતિ", "વડાપ્રધાન", "ઉપરાષ્ટ્રપતિ", "સ્પીકર"], a:"ઉપરાષ્ટ્રપતિ"},
    {q:"કઈ ખેતીમાં પાકની સાથે પશુપાલન પણ કરવામાં આવે છે?", o:["સ્થળાંતરિત ખેતી", "મિશ્ર ખેતી", "બાગાયતી ખેતી", "સઘન ખેતી"], a:"મિશ્ર ખેતી"},
    {q:"લોખંડ-પોલાદનો ઉદ્યોગ કયા પ્રકારનો ઉદ્યોગ છે?", o:["કૃષિ આધારિત", "ખનીજ આધારિત", "સમુદ્ર આધારિત", "વન આધારિત"], a:"ખનીજ આધારિત"},
    {q:"ભારતના બંધારણના ઘડવૈયા કોણ ગણાય છે?", o:["ગાંધીજી", "સરદાર પટેલ", "ડૉ. બી. આર. આંબેડકર", "જવાહરલાલ નહેરુ"], a:"ડૉ. બી. આર. આંબેડકર"},
    {q:"ભારતની સર્વોચ્ચ અદાલત ક્યાં આવેલી છે?", o:["અમદાવાદ", "મુંબઈ", "નવી દિલ્હી", "કોલકાતા"], a:"નવી દિલ્હી"},
    {q:"કયા વાયુને લીધે પૃથ્વી પર ગરમીનું પ્રમાણ વધે છે?", o:["ઓક્સિજન", "નાઈટ્રોજન", "કાર્બન ડાયોક્સાઈડ", "આર્ગોન"], a:"કાર્બન ડાયોક્સાઈડ"},

    {q:"ભારતનું બંધારણ ઘડવા માટેની ખરડા સમિતિના અધ્યક્ષ કોણ હતા?", o:["જવાહરલાલ નહેરુ", "ડૉ. બી. આર. આંબેડકર", "સરદાર પટેલ", "રાજેન્દ્ર પ્રસાદ"], a:"ડૉ. બી. આર. આંબેડકર"},
    {q:"બંધારણ સભાના અધ્યક્ષ કોણ હતા?", o:["ડૉ. રાજેન્દ્ર પ્રસાદ", "ગાંધીજી", "મૌલાના આઝાદ", "સુભાષચંદ્ર બોઝ"], a:"ડૉ. રાજેન્દ્ર પ્રસાદ"},
    {q:"ભારતીય બંધારણ કઈ તારીખે સ્વીકારવામાં આવ્યું (પસાર થયું)?", o:["26 જાન્યુઆરી 1950", "15 ઓગસ્ટ 1947", "26 નવેમ્બર 1949", "9 ડિસેમ્બર 1946"], a:"26 નવેમ્બર 1949"},
    {q:"બંધારણ ઘડવામાં કેટલો સમય લાગ્યો હતો?", o:["2 વર્ષ 11 માસ 18 દિવસ", "3 વર્ષ", "1 વર્ષ 8 માસ", "2 વર્ષ 5 માસ"], a:"2 વર્ષ 11 માસ 18 દિવસ"},
    {q:"ભારતના બંધારણની શરૂઆત શેનાથી થાય છે?", o:["મૂળભૂત હકો", "આમુખ", "રાજનીતિના સિદ્ધાંતો", "કાયદાઓ"], a:"આમુખ"},
    {q:"દુનિયાનું સૌથી મોટું લિખિત બંધારણ કયા દેશનું છે?", o:["અમેરિકા", "બ્રિટન", "ભારત", "રશિયા"], a:"ભારત"},
    {q:"કેટલા વર્ષની ઉંમરે ભારતમાં મતાધિકાર પ્રાપ્ત થાય છે?", o:["15 વર્ષ", "18 વર્ષ", "21 વર્ષ", "25 વર્ષ"], a:"18 વર્ષ"},
    {q:"ભારત દેશ કેવું રાષ્ટ્ર છે?", o:["બિનસાંપ્રદાયિક", "ધાર્મિક", "સામ્યવાદી", "રાજાશાહી"], a:"બિનસાંપ્રદાયિક"},
    {q:"કયા હક વિના અન્ય હકો અર્થહીન છે?", o:["સમાનતાનો હક", "સ્વતંત્રતાનો હક", "બંધારણીય ઇલાજોનો હક", "ધાર્મિક સ્વાતંત્ર્ય"], a:"બંધારણીય ઇલાજોનો હક"},

function shuffleArray(array) {
    let shuffled = [...array]; 
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}
      
 

let quiz=[],current=0,score=0,timeLeft=3600,timerId;
let studentAnswers=[],answered=[];
let results=JSON.parse(localStorage.getItem("results")||"[]");
let photoURL="";

document.getElementById("photo").onchange=e=>{
const file=e.target.files[0];
if(file){
const reader=new FileReader();
reader.onload=ev=>photoURL=ev.target.result;
reader.readAsDataURL(file);
}
};

function loadChapters(){
const ch=document.getElementById("chapter");
ch.innerHTML='<option value="">પાઠ પસંદ કરો</option>';
const sub=document.getElementById("subject").value;
if(sub && DATA[sub]){
Object.keys(DATA[sub]).forEach(k=>{
ch.innerHTML+=`<option value="${k}">${k}</option>`;
});
}
}

function setTheme(){
const sub=document.getElementById("subject").value;
document.querySelectorAll('.card').forEach(c=>{
c.classList.remove("river","maths");
c.classList.add(sub==="maths"?"maths":"river");
});
}

function startQuiz(){
const roll=document.getElementById("roll").value.trim();
const name=document.getElementById("studentName").value.trim();
const sub=document.getElementById("subject").value;
const ch=document.getElementById("chapter").value;

if(!roll||!name||!sub||!ch){alert("બધી માહિતી ભરો!");return;}

quiz=[...(DATA[sub][ch]||[])];
quiz.sort(()=>Math.random()-0.5);

current=0;score=0;timeLeft=3600;
studentAnswers=[];
answered=new Array(quiz.length).fill(false);

document.getElementById("home").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

createPalette();
startTimer();
showQuestion();
}

function createPalette(){
const pal=document.getElementById("palette");
pal.innerHTML="";
quiz.forEach((_,i)=>{
const btn=document.createElement("button");
btn.textContent=i+1;
btn.id="p"+i;
btn.onclick=()=>goToQuestion(i);
pal.appendChild(btn);
});
}

function goToQuestion(i){
current=i;
showQuestion();
}

function startTimer(){
timerId=setInterval(()=>{
const m=Math.floor(timeLeft/60);
const s=timeLeft%60;
document.getElementById("timer").textContent=`⏱ ${m}:${s<10?"0":""}${s}`;
if(timeLeft<=60) document.getElementById("timer").classList.add("timer-warning");
timeLeft--;
if(timeLeft<0) finishQuiz();
},1000);
}

function showQuestion(){
if(current>=quiz.length)return finishQuiz();

document.getElementById("progress").textContent=`પ્રશ્ન ${current+1}/${quiz.length}`;
document.getElementById("q").textContent=quiz[current].q;

document.querySelectorAll("#palette button").forEach(b=>b.classList.remove("active"));
document.getElementById("p"+current).classList.add("active");

const opts=document.getElementById("opts");
opts.innerHTML="";

// ઓપ્શન્સને પહેલા શફલ કરો
const shuffledOptions = shuffleArray(quiz[current].o);

// હવે શફલ થયેલા ઓપ્શન્સ પર લૂપ ફેરવો
shuffledOptions.forEach(opt=>{
    const d=document.createElement("div");
    d.className="option";
    d.textContent=opt;
    d.onclick=()=>checkAnswer(opt,d);
    opts.appendChild(d);
});
}


function checkAnswer(selected,element){
if(answered[current]) return;

const correct=quiz[current].a;
answered[current]=true;

if(selected===correct){
score++;
element.classList.add("right");
document.getElementById("p"+current).style.background="#28a745";
}else{
element.classList.add("wrong");
document.getElementById("p"+current).style.background="#dc3545";
[...document.querySelectorAll(".option")].forEach(opt=>{
if(opt.textContent===correct){
opt.classList.add("right");
}
});
}

studentAnswers.push({
question:quiz[current].q,
selected:selected,
correct:correct,
isCorrect:selected===correct
});

setTimeout(()=>{
current++;
showQuestion();
},800);
}

function finishQuiz() {
    clearInterval(timerId);
    document.getElementById("quiz").classList.add("hidden");
    const resDiv = document.getElementById("result");
    resDiv.classList.remove("hidden");

    const percent = Math.round((score / quiz.length) * 100);
    const sName = document.getElementById("studentName").value.trim();
    const roll = document.getElementById("roll").value.trim();
    const sub = document.getElementById("subject").value;
    const ch = document.getElementById("chapter").value;
    
    let wrongCount = quiz.length - score;

    // અહીં હેડિંગમાં વિદ્યાર્થીનું નામ ઉમેર્યું છે
    let html = `
        <h2 style="color:#1a1a2e; text-align:center; font-size:26px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">
            🌟 ${sName} નું પરિણામ 🌟
        </h2>
        
        <div class="stat-box">
            <div class="stat-item" style="border-bottom: 5px solid #2ecc71;">
                <span class="stat-value" style="color:#2ecc71;">${score}</span>
                <span class="stat-label">સાચા જવાબ</span>
            </div>
            <div class="stat-item" style="border-bottom: 5px solid #e74c3c;">
                <span class="stat-value" style="color:#e74c3c;">${wrongCount}</span>
                <span class="stat-label">ખોટા જવાબ</span>
            </div>
            <div class="stat-item" style="border-bottom: 5px solid #f1c40f;">
                <span class="stat-value" style="color:#f1c40f;">${percent}%</span>
                <span class="stat-label">ટકાવારી</span>
            </div>
        </div>
    `;

    // ભૂલો બતાવવાનું લિસ્ટ - અહીં ફોન્ટ ડાર્ક કર્યા છે
    let wrongList = studentAnswers.filter(a => !a.isCorrect);
    if (wrongList.length > 0) {
        html += "<h3 style='color:#d81b60; text-align:left; margin-left:10px; font-size:18px;'>❌ તમારી ભૂલો સુધારો:</h3>";
        html += "<div style='max-height:220px; overflow-y:auto; margin-bottom:15px; padding:5px;'>";
        wrongList.forEach((w, index) => {
            html += `
                <div style="background:white; padding:12px; margin-bottom:10px; border-radius:12px; font-size:15px; box-shadow:0 4px 6px rgba(0,0,0,0.05); text-align:left; color:#1a1a2e; border-left:6px solid #e74c3c;">
                    <b style="color:#444;">પ્રશ્ન ${index + 1}:</b> <span style="font-weight:600;">${w.question}</span><br>
                    <div style="margin-top:5px;">
                        <span style="color:#d32f2f; font-weight:bold;">તમારો જવાબ: ${w.selected}</span><br>
                        <span style="color:#1b5e20; font-weight:bold;">સાચો જવાબ: ${w.correct}</span>
                    </div>
                </div>`;
        });
        html += "</div>";
    } else {
        html += "<div style='background:#27ae60; color:white; padding:15px; border-radius:10px; margin-bottom:15px; font-weight:bold;'>અદભુત! તમે બધા જ સાચા જવાબ આપ્યા છે. 🏆</div>";
    }

    html += `
        <button onclick="showFinalCertificate()" style="background:#2ecc71; font-size:18px; padding:15px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);">📜 VIEW CERTIFICATE</button>
        <button onclick="goHome()" style="background:#444; margin-top:8px;">🏠 મુખ્ય મેનુ</button>
    `;
    resDiv.innerHTML = html;

    saveResultToLocal(roll, sName, sub, ch, score, quiz.length, percent);
}
function saveResultToLocal(roll, name, subject, chapter, score, total, percent) {
    const now = new Date();
    const dateStr = now.toLocaleDateString() + " " + now.getHours() + ":" + now.getMinutes();
    
    const newResult = {
        roll: roll,
        name: name,
        subject: subject,
        chapter: chapter,
        score: score,
        total: total,
        percent: percent,
        date: dateStr
    };

    results.push(newResult);
    localStorage.setItem("results", JSON.stringify(results));
}

function downloadExcel() {
    if (results.length === 0) {
        alert("ડાઉનલોડ કરવા માટે કોઈ ડેટા નથી!");
        return;
    }

    // Excel ને ગુજરાતી સમજાવવા માટે BOM ઉમેરવો જરૂરી છે
    let csvContent = "\uFEFF"; // આ BOM છે જે ગુજરાતી અક્ષરોને Excel માં સાચા બતાવશે
    csvContent += "Roll No,Name,Subject,Chapter,Score,Total,Percentage,Date\n";

    results.forEach(r => {
        let row = `${r.roll},${r.name},${r.subject},${r.chapter},${r.score},${r.total},${r.percent}%,${r.date}`;
        csvContent += row + "\n";
    });

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", "Quiz_Results_Antrol_School.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
